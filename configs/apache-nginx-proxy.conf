# apache-nginx-proxy.conf
# Deploy to: /etc/apache2/conf-available/nginx-proxy.conf
# Enable with: a2enconf nginx-proxy && systemctl reload apache2
#
# PURPOSE:
#   When nginx proxies HTTPS requests to Apache on port 9080, Apache receives
#   them as plain HTTP from 127.0.0.1. PHP applications (WordPress, Joomla,
#   Nextcloud, etc.) check $_SERVER['HTTPS'] and $_SERVER['SERVER_PORT'] to
#   determine whether they are running over HTTPS. Without this config:
#
#   - WordPress generates HTTP URLs for assets, causing mixed-content warnings
#   - WordPress admin redirects to HTTP, breaking the panel
#   - Applications may refuse to set Secure cookies
#   - FORCE_SSL_ADMIN loops or fails
#   - Nextcloud marks itself as "not accessed over HTTPS" in admin panel
#
#   This config uses mod_setenvif to set the HTTPS and SERVER_PORT environment
#   variables based on the connecting IP. Since only nginx (127.0.0.1) proxies
#   to Apache, this is safe and correct.
#
# WHY SetEnvIf AND NOT RequestHeader?
#   RequestHeader set X-Forwarded-Proto https would require mod_headers and
#   then application-side configuration to check that header. SetEnvIf directly
#   sets the CGI/FastCGI environment variable that PHP reads via $_SERVER['HTTPS'],
#   which works universally across all PHP applications without any app config.
#
# WHY NOT mod_remoteip?
#   mod_remoteip rewrites REMOTE_ADDR to the client IP from X-Forwarded-For.
#   This is useful for logging but NOT required for HTTPS detection.
#   mod_remoteip adds complexity (trusted proxy config) with little benefit
#   for this setup. Access logs can be handled at the nginx level instead.
#
# SCOPE:
#   This is a global Apache conf — it applies to ALL virtual hosts automatically.
#   No per-site config needed. New sites added via ISPconfig will work correctly
#   with HTTPS detection from the moment they are created.

# Requires: mod_setenvif (enabled by default on Ubuntu/Debian Apache)
<IfModule mod_setenvif.c>
    # Set HTTPS=on for all requests arriving from localhost (nginx proxy).
    # PHP reads this as $_SERVER['HTTPS'] == 'on', which is the standard
    # indicator that the client connection is over HTTPS.
    SetEnvIf Remote_Addr "^127\.0\.0\.1$" HTTPS=on

    # Set SERVER_PORT=443 so PHP reports the correct port in $_SERVER['SERVER_PORT'].
    # Some applications use this to construct redirect URLs. Without it,
    # they may generate URLs with :9080 instead of the correct HTTPS port.
    SetEnvIf Remote_Addr "^127\.0\.0\.1$" SERVER_PORT=443
</IfModule>
