user www-data;
worker_processes auto;
pid /run/nginx.pid;
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 1024;
    # multi_accept on allows nginx to accept as many connections as possible
    # per worker wakeup. Beneficial under high concurrent connection load.
    multi_accept on;
}

http {
    ##
    # Basic settings
    ##
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    ##
    # SSL settings
    ##
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;

    # Session cache avoids full TLS handshake on reconnect.
    # shared:SSL:10m = ~40,000 sessions. timeout 1d keeps sessions alive for a day.
    # Tickets disabled: session tickets have forward-secrecy implications.
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling: nginx fetches and caches the certificate revocation status,
    # then includes it in the TLS handshake. Reduces client round-trips.
    # resolver points to Google + Cloudflare DNS for OCSP lookups.
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 1.1.1.1 valid=300s;
    resolver_timeout 5s;

    ##
    # Logging
    ##
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    ##
    # Gzip compression
    ##
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        application/atom+xml
        application/geo+json
        application/javascript
        application/x-javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rdf+xml
        application/rss+xml
        application/vnd.ms-fontobject
        application/wasm
        application/x-web-app-manifest+json
        application/xhtml+xml
        application/xml
        font/eot
        font/otf
        font/ttf
        image/bmp
        image/svg+xml
        image/vnd.microsoft.icon
        image/x-icon
        text/cache-manifest
        text/calendar
        text/css
        text/javascript
        text/markdown
        text/plain
        text/xml
        text/vcard
        text/vnd.rim.location.xloc
        text/vtt
        text/x-component
        text/x-cross-domain-policy;

    ##
    # Brotli compression (requires libnginx-mod-http-brotli-filter)
    # Brotli achieves ~20% better compression than gzip for text assets.
    # Supported by all modern browsers (Chrome, Firefox, Safari, Edge).
    ##
    brotli on;
    brotli_comp_level 6;
    brotli_static on;
    brotli_types
        application/atom+xml
        application/geo+json
        application/javascript
        application/x-javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rdf+xml
        application/rss+xml
        application/vnd.ms-fontobject
        application/wasm
        application/x-web-app-manifest+json
        application/xhtml+xml
        application/xml
        font/eot
        font/otf
        font/ttf
        image/bmp
        image/svg+xml
        image/vnd.microsoft.icon
        image/x-icon
        text/cache-manifest
        text/calendar
        text/css
        text/javascript
        text/markdown
        text/plain
        text/xml
        text/vcard
        text/vnd.rim.location.xloc
        text/vtt
        text/x-component
        text/x-cross-domain-policy;

    ##
    # Open file cache
    # Caches file descriptors and metadata for frequently accessed files.
    # Avoids repeated syscalls (open, stat) for static asset serving.
    # max=10000: cache up to 10k files
    # inactive=30s: evict entries not accessed within 30 seconds
    # valid=60s: re-check file existence/permissions every 60 seconds
    # min_uses=2: only cache files accessed at least twice (avoid caching one-off requests)
    ##
    open_file_cache max=10000 inactive=30s;
    open_file_cache_valid 60s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    ##
    # Proxy settings (global defaults for all proxy_pass blocks)
    ##

    # Use HTTP/1.1 for upstream connections.
    # HTTP/1.0 doesn't support chunked transfer encoding or keepalive to upstream.
    proxy_http_version 1.1;

    # CRITICAL: Clear the Connection header to upstream.
    # HTTP/1.1 uses Connection: keep-alive by default. If this header is
    # forwarded to Apache and Apache returns Connection: upgrade or similar
    # hop-by-hop headers, nginx will pass them to the client.
    # HTTP/2 clients (especially Safari) reject responses containing
    # Connection or Upgrade headers with PROTOCOL_ERROR.
    # Setting Connection "" prevents this header from being forwarded upstream.
    proxy_set_header Connection "";

    # CRITICAL: Hide hop-by-hop headers from Apache responses.
    # Apache (especially with certain modules) may include Upgrade and Connection
    # headers in responses. These are hop-by-hop headers — they must NEVER be
    # forwarded to HTTP/2 clients. Safari will abort the connection with
    # PROTOCOL_ERROR if it receives these headers over HTTP/2.
    # proxy_hide_header strips them from all proxied responses.
    proxy_hide_header Upgrade;
    proxy_hide_header Connection;

    # Proxy buffer settings.
    # These control how nginx buffers responses from Apache before forwarding
    # to the client. Larger buffers allow nginx to read a full response from
    # Apache without needing to maintain the upstream connection while the
    # (potentially slow) client receives the data.
    # 128k proxy_buffer_size handles large response headers (e.g. Set-Cookie storms).
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    # Timeouts for proxy connections.
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    ##
    # Security headers (applied globally)
    ##
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    ##
    # Virtual host configs
    ##
    include /etc/nginx/conf.d/*.conf;
    include /etc/nginx/sites-enabled/*;
}
